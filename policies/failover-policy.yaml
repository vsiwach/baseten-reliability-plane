# Failover policy — where traffic goes when a pool is quarantined or down (F1.5).
# Baseten default — override in the console (failover toggle).
failover:
  # ordered: the second dedicated cluster takes over first (same SKU, same
  # model, no cold surprise); the serverless Model APIs absorb anything left
  spill_order: [baseten-dedicated-2, baseten-model-api]
  spill_on: [quarantine, pool_down, capacity_wait]
  drain_before_stop: true           # a draining replica stops only at 0 in-flight

# Known hazards the failover path must price in — real failure classes
# from the friction log, never invented ones.
hazards:
  - id: rate-limit-coupling
    pool: baseten-model-api
    friction: 10
    note: per-model-per-workspace 429 quota; spilled traffic and recovery
      probes spend the SAME budget, so a spill can starve verification
  - id: capacity-wait
    pool: baseten-dedicated
    friction: 6
    note: scarce SKUs can sit DEPLOYING with no queue position; placement
      must surface WAITING_FOR_CAPACITY with an alternative, never hang silent
